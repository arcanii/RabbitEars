#
# Windows CI — peer of mac-core.yml. Two jobs off the unified root CMake:
#   core-selftest : builds common/ (RabbitEarsCore) + Win32/ (PlatformWin + CLI)
#                   on MSVC and runs --selftest. Fast, no external deps.
#   gui-build     : builds the full Direct2D GUI (RABBITEARS_BUILD_GUI=ON,
#                   provisions libVLC + WinSparkle) so the Win32 UI compiles/links
#                   — the surface the core job does NOT cover.
name: Windows

on:
  push:
    paths:
      - 'common/**'
      - 'Win32/**'
      - 'third_party/**'
      - 'packaging/**'
      - 'art/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/windows-core.yml'
  pull_request:
    paths:
      - 'common/**'
      - 'Win32/**'
      - 'third_party/**'
      - 'packaging/**'
      - 'art/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/windows-core.yml'
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-selftest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so version.h's BUILD_NUMBER (git commit count) is real
      - name: Configure (core + Win32 platform + CLI; GUI off)
        run: cmake -S . -B build -DRABBITEARS_BUILD_GUI=OFF
      - name: Build
        run: cmake --build build --config RelWithDebInfo
      - name: Core self-test
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure

  gui-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure (full GUI; provisions libVLC + WinSparkle)
        run: cmake -S . -B build-gui -DRABBITEARS_BUILD_GUI=ON
      - name: Build the Direct2D GUI
        run: cmake --build build-gui --config RelWithDebInfo
