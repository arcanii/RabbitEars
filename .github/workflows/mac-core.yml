# SPDX-License-Identifier: GPL-3.0-or-later
#
# macOS shared-core CI — the "drift alarm" requested in docs/MACOS_PORT.md (§6).
#
# Builds the genuinely-portable shared core (M3uParser + Database + DockLayout,
# in common/) on Apple clang/libc++ and runs the core self-test. Any Windows-side
# change that breaks the shared core turns this red immediately, instead of
# surfacing later on the macOS branch.
#
# It drives the unified root CMake via scripts/build-mac.sh — the dependency-free
# path (no libVLC / Sparkle / Cocoa), so it needs nothing beyond the CMake +
# Xcode clang already on the macos-latest image. The .app is Phase-1 work and is
# intentionally NOT built here.
name: macOS core

on:
  push:
    paths:
      - 'common/**'
      - 'mac/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'scripts/build-mac.sh'
      - '.github/workflows/mac-core.yml'
  pull_request:
    paths:
      - 'common/**'
      - 'mac/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'scripts/build-mac.sh'
      - '.github/workflows/mac-core.yml'
  workflow_dispatch:

# Supersede in-flight runs on the same ref.
concurrency:
  group: mac-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-selftest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so version.h's BUILD_NUMBER (git commit count) is real
      - name: Build shared core + run self-test (Apple clang/libc++)
        run: bash scripts/build-mac.sh

  # Build the Cocoa .app (RABBITEARS_BUILD_MAC=ON) so the macOS UI compiles/links
  # — the peer of the Windows gui-build job. libVLC is best-effort: if VLC.app is
  # present the playback path builds too, otherwise Mac.cmake falls back to the
  # stub (non-fatal), still validating all the Cocoa/ObjC++ UI code.
  app-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Provision libVLC (best-effort, for the playback path)
        run: brew install --cask vlc || echo "VLC cask unavailable — building app in stub mode"
      - name: Build RabbitEars.app
        run: cmake -S . -B build-app -DRABBITEARS_BUILD_MAC=ON && cmake --build build-app
